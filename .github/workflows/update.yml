name: Actualitzar classificacions Tour 2026

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descarregar repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install requests beautifulsoup4

      - name: Executar scraper
        run: python update_data.py

      - name: Pujar dades actualitzades
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/classifications.json
          git diff --cached --quiet || git commit -m "Auto: actualitzar classificacions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
